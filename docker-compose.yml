services:
  redis:
    image: redis:alpine
    ports:
      - "6380:6379"
    restart: unless-stopped

  pppoker-bridge:
    build:
      context: ../Ppfichas
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    restart: unless-stopped
    environment:
      - PYTHONUNBUFFERED=1
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
