name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Lint, Typecheck & Build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.2.22"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint
        run: bun run lint

      - name: Typecheck
        run: bun run typecheck

      - name: Build
        run: bun build
        env:
          NEXT_PUBLIC_SUPABASE_URL: "http://placeholder"
          NEXT_PUBLIC_SUPABASE_ANON_KEY: "placeholder"
          NEXT_PUBLIC_SUPABASE_ID: "placeholder"
          NEXT_PUBLIC_URL: "http://localhost:3100"
          NEXT_PUBLIC_API_URL: "http://localhost:3101"
          SUPABASE_SERVICE_KEY: "placeholder"
          DATABASE_PRIMARY_URL: "postgresql://placeholder"
          DATABASE_SESSION_POOLER: "postgresql://placeholder"

  test:
    name: Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.2.22"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run tests
        run: bun test
